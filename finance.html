<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0B2818">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IMARAT Finance">
<title>IMARAT Finance Command Centre</title>
<link rel="manifest" href="/imarat-sap/manifest.json">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   IMARAT FINANCE — Design System v2.1 (bug-fixed)
═══════════════════════════════════════════════════════ */
:root{
  --hdr:#0B2818;--nav:#0D3020;--body-bg:#0F1A12;
  --gold:#C9A850;--gold-l:#F5E8BE;--gold-d:#A8862E;
  --card:#FFFFFF;--card-bg:#FAF8F2;
  --t1:#132015;--t2:#4A6B4E;--t3:#8AAB8E;
  --bdr:#D8E8DA;
  --green:#16A34A;--gbg:#DCFCE7;--gdk:#15803D;
  --red:#DC2626;--rbg:#FEE2E2;
  --amber:#D97706;--abg:#FEF3C7;
  --blue:#2563EB;--bbg:#DBEAFE;
  --pur:#7C3AED;
  --sh:0 1px 6px rgba(0,0,0,.12),0 0 0 .5px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.18);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --mono:ui-monospace,monospace;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--body-bg);color:var(--t1);min-height:100vh}

/* ── LOGIN ───────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--hdr);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.login-box{background:#fff;border-radius:18px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 12px 48px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.login-logo-icon{width:46px;height:46px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.login-title{font-size:18px;font-weight:700;color:var(--t1)}
.login-sub{font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.lf-lbl{font-size:10px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block;letter-spacing:.04em;text-transform:uppercase}
.lf-inp{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:9px;font-size:15px;font-family:var(--font);color:var(--t1);outline:none;margin-bottom:13px;transition:border-color .2s}
.lf-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-l)}
.lf-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--hdr),#1A4D30);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);letter-spacing:.04em;transition:opacity .2s}
.lf-btn:hover{opacity:.88}.lf-btn:disabled{opacity:.5;cursor:default}
.lf-err{background:var(--rbg);color:var(--red);border-radius:8px;padding:8px 12px;font-size:12px;margin-top:10px;display:none}

/* ── LOADING ─────────────────────────────────────────── */
#loading-overlay{position:fixed;inset:0;background:rgba(11,40,24,.8);display:none;align-items:center;justify-content:center;z-index:900;flex-direction:column}
.spinner{width:40px;height:40px;border:3px solid rgba(201,168,80,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:12px;margin-top:12px;opacity:.75}

/* ── STALE BANNER ────────────────────────────────────── */
#stale-banner{background:linear-gradient(90deg,var(--amber),#F59E0B);color:#fff;font-size:11px;font-weight:600;padding:6px 16px;text-align:center;display:none}

/* ── HEADER ──────────────────────────────────────────── */
.hdr{background:var(--hdr);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.hdr-l{display:flex;align-items:center;gap:10px;min-width:0}
.logo-box{width:36px;height:36px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-en{font-size:14px;font-weight:700;color:#fff;letter-spacing:.06em;white-space:nowrap}
.brand-sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:7px}
.live-pill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(22,163,74,.2);color:#4ADE80;white-space:nowrap;display:flex;align-items:center;gap:4px}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;font-family:var(--font);transition:all .2s}
.hdr-btn:hover{background:rgba(255,255,255,.16);color:#fff}
.hdr-user,.hdr-date{font-size:11px;color:rgba(255,255,255,.45)}
#refresh-status{font-size:10px;color:rgba(255,255,255,.35);font-family:var(--mono)}

/* ── NAV ─────────────────────────────────────────────── */
.nav{background:var(--nav);border-bottom:1px solid rgba(255,255,255,.07);padding:0 6px;display:flex;position:sticky;top:56px;z-index:199;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nt{padding:0 12px;height:42px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);flex-shrink:0}
.nt:hover{color:rgba(255,255,255,.75)}
.nt.on{color:#fff;border-bottom-color:var(--gold)}
.nt svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── MAIN ────────────────────────────────────────────── */
.main{padding:12px;padding-bottom:40px}
.pane{display:none}.pane.on{display:block}

/* ── HERO CARD ───────────────────────────────────────── */
.hero-card{position:relative;overflow:hidden;border-radius:var(--r);padding:18px 16px;margin-bottom:12px;cursor:pointer;
  background:linear-gradient(135deg,#0B2818 0%,#14402A 55%,#1A4D30 100%);
  border:1px solid rgba(201,168,80,.45);
  box-shadow:0 2px 8px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.04)}
.hero-card::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(112deg,transparent 45%,rgba(201,168,80,.06) 60%,rgba(201,168,80,.22) 72%,rgba(201,168,80,.34) 78%,rgba(201,168,80,.14) 86%,transparent 100%),
  radial-gradient(180px 130px at 100% 0%,rgba(201,168,80,.22),transparent 70%)}
.hero-card:hover{opacity:.94}
.hero-icon{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:11px;background:rgba(201,168,80,.18);border:1px solid rgba(201,168,80,.35);display:flex;align-items:center;justify-content:center;font-size:20px}
.hero-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-right:54px;position:relative}
.hero-lbl::after{content:'';display:block;width:32px;height:1px;margin-top:7px;background:linear-gradient(90deg,var(--gold),rgba(201,168,80,.3) 70%,transparent)}
.hero-val{font-family:var(--mono);font-size:32px;font-weight:700;color:#fff;line-height:1;margin-bottom:7px;letter-spacing:-.5px}
.hero-sub{font-size:11px;color:rgba(245,232,190,.75);display:flex;justify-content:space-between;align-items:center}
.hero-arr{color:rgba(201,168,80,.8)}

/* ── FLAT KPI GRID ───────────────────────────────────── */
.flat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.flat-kpi{position:relative;background:var(--card-bg);border-radius:11px;border-left:4px solid var(--ac,var(--gold));box-shadow:0 2px 8px rgba(0,0,0,.1);padding:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:5px;overflow:hidden}
.flat-kpi:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.flat-kpi:active{transform:translateY(0);opacity:.9}
.fk-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.fk-val{font-family:var(--mono);font-size:19px;font-weight:700;color:#132015;letter-spacing:-.3px;white-space:nowrap}
.fk-sub{font-size:10px;color:var(--t3);line-height:1.3}
.fk-bar{margin-top:5px;display:flex;align-items:center;gap:5px}
.fk-bar::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--ac,var(--gold));flex-shrink:0}
.fk-bar::after{content:'';display:block;flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--ac,var(--gold)),transparent);opacity:.5}

/* ── CARD ────────────────────────────────────────────── */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.ch{padding:12px 15px;border-bottom:1px solid #E8F0E9;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct{font-size:13px;font-weight:600;color:var(--t1)}
.cb{padding:14px 15px}
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.bdg-gold{background:var(--gold-l);color:var(--gold-d)}
.bdg-gray{background:#F0F4F0;color:var(--t2)}

/* ── ENTITY BARS ─────────────────────────────────────── */
.ent-row{margin-bottom:14px;padding:4px 2px;border-radius:8px;cursor:pointer;transition:background .15s}
.ent-row:last-child{margin-bottom:0}
.ent-row:hover{background:#F7FBF7}
.ent-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ent-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--t1)}
.ent-right{display:flex;align-items:center;gap:9px}
.ent-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1)}
.ent-pct{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;background:#F1F5F1;color:var(--t2);font-family:var(--mono);font-size:10px;font-weight:600}
.arr-sm{font-size:10px;color:var(--t3);font-weight:400}
.bar-track{background:#E4EFE5;border-radius:99px;height:8px;overflow:hidden}
.bar-fill{height:8px;border-radius:99px;transition:width .8s ease}

/* ── DONUT ───────────────────────────────────────────── */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.dleg{width:100%}
.dleg-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .15s}
.dleg-row:hover{background:#F7FBF7}
.dleg-l{display:flex;align-items:center;gap:8px;color:var(--t1);font-weight:500}
.dleg-r{display:flex;align-items:baseline;gap:9px}
.dleg-amt{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t1)}
.dleg-pct{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--t3);min-width:34px;text-align:right}

/* ── PIPELINE ────────────────────────────────────────── */
.pipeline{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:0;margin-bottom:10px}
.pip-box{text-align:center;padding:12px 6px;background:#F2F7F2;border-radius:10px}
.pip-box.hi{background:#FFF8E6;border:1px solid var(--gold)}
.pip-val{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:5px}
.pip-lbl{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t2)}
.pip-conn{font-size:13px;font-weight:700;color:var(--t3);padding:0 5px;text-align:center}
.pip-note{font-size:10px;color:var(--t3);padding-top:9px;border-top:1px solid var(--bdr);line-height:1.5}

/* ── CLEARANCE GRID ──────────────────────────────────── */
.clr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.clr-tile{padding:12px 8px;border-radius:10px;text-align:center;cursor:pointer;transition:transform .15s}
.clr-tile:hover{transform:translateY(-1px)}
.clr-tile.a21{background:#DCFCE7}
.clr-tile.a21 .clr-name{color:#15803D}.clr-tile.a21 .clr-val{color:#166534}
.clr-tile.graana{background:#FEE2E2}
.clr-tile.graana .clr-name{color:#B91C1C}.clr-tile.graana .clr-val{color:#991B1B}
.clr-tile.imarat{background:#166534}
.clr-tile.imarat .clr-name{color:rgba(255,255,255,.75)}.clr-tile.imarat .clr-val{color:#fff}
.clr-name{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.clr-val{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:-.2px}
.clr-total{background:#fff;border:1px solid #B7D2BA;border-radius:10px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}
.clr-total span:first-child{font-size:12px;font-weight:700;color:#166534}
.clr-total-val{font-family:var(--mono);font-size:15px;font-weight:700;color:#166534;letter-spacing:-.3px}

/* ── DOT HELPERS ─────────────────────────────────────── */
.dot-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0;display:inline-block}
.dot-sq.sm{width:10px;height:10px;border-radius:1px}
.dot-sm{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:3px}

/* ── SECTION HEADER ──────────────────────────────────── */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.sec-hdr span:last-child{font-family:var(--mono);font-size:10px;font-weight:600;color:rgba(255,255,255,.4)}

/* ── BANK GROUPS ─────────────────────────────────────── */
.bank-group{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:10px}
.bank-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #F0F5F0}
.bank-hdr-l{display:flex;align-items:center;gap:12px}
.bank-logo{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:-.5px;flex-shrink:0}
.bank-name{font-size:14px;font-weight:700;color:var(--t1)}
.bank-sub{font-size:11px;color:var(--t3);margin-top:1px}
.bank-hdr-r{text-align:right}
.bank-tot{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--t1)}
.bank-status{font-size:10px;font-weight:600;color:var(--green);letter-spacing:.05em}
.acc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:.5px solid #F0F5F0}
.acc-row:last-child{border-bottom:none}
.acc-left{display:flex;align-items:center;gap:10px}
.acc-code{font-size:12px;font-weight:600;color:var(--t1)}
.acc-ent{font-size:10px;color:var(--t3);margin-top:1px}
.acc-right{text-align:right}
.acc-amt{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1)}
.acc-float{font-size:10px;color:var(--amber);font-weight:600;margin-top:1px}

/* ── ENTITY PILLS ────────────────────────────────────── */
.pill-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.epill{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.epill:hover{background:rgba(255,255,255,.15)}
.epill.active{background:#166534;color:#fff;border-color:#166534}

/* ── ACTIVITY FEED ───────────────────────────────────── */
.act-row{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 0;border-bottom:.5px solid var(--bdr)}
.act-row:last-child{border-bottom:none}
.act-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0}
.act-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0;margin-top:2px}
.act-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-ent{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center}
.act-right{text-align:right;flex-shrink:0;margin-left:10px}
.act-amt{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1)}
.act-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:3px;display:inline-block;letter-spacing:.04em}

/* ── CLEARED TODAY ───────────────────────────────────── */
.cleared-bar-wrap{margin-bottom:12px}
.cleared-bar{display:flex;height:8px;border-radius:99px;overflow:hidden;background:#E4EFE5}
.cleared-seg{height:8px}
.cleared-rows{display:flex;flex-direction:column;gap:7px}
.cleared-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.cleared-amt{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--t1)}

/* ── SPLIT CARD ──────────────────────────────────────── */
.split-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);display:grid;grid-template-columns:1fr auto;overflow:hidden;margin-bottom:12px;border-left:4px solid var(--red)}
.split-l{padding:14px 15px}
.split-r{padding:14px 15px;border-left:1px solid var(--bdr);text-align:right;min-width:120px}
.split-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.split-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.split-sub{font-size:10px;color:var(--t3);margin-top:3px}
.top-star{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px}
.top-amt{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--t1)}

/* ── RISK GRID ───────────────────────────────────────── */
.risk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.risk-card{background:#fff;border-radius:11px;box-shadow:var(--sh);padding:12px 10px;text-align:center;border-top:3px solid transparent}
.risk-card.red{border-top-color:var(--red)}.risk-card.amber{border-top-color:var(--amber)}.risk-card.green{border-top-color:var(--green)}
.risk-icon{font-size:14px;margin-bottom:3px}
.risk-cnt{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--t1);line-height:1}
.risk-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:2px 0}
.risk-card.red .risk-lbl{color:var(--red)}.risk-card.amber .risk-lbl{color:var(--amber)}.risk-card.green .risk-lbl{color:var(--green)}
.risk-amt{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t2)}

/* ── TX CARDS (RECEIVABLES) ──────────────────────────── */
.tx-card{background:#fff;border-radius:11px;box-shadow:var(--sh);overflow:hidden;margin-bottom:9px}
.tx-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 13px 10px}
.tx-tl{flex:1;min-width:0;margin-right:10px}
.tx-name{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);margin-top:4px}
.age-pill{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;border:1px solid;background:transparent}
.tx-tr{text-align:right;flex-shrink:0}
.tx-amt{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--t1)}
.risk-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:4px;display:inline-block}
.risk-badge.hr{background:#FEF2F2;color:#991B1B}
.risk-badge.esc{background:#FEF3C7;color:#92400E}
.risk-badge.mon{background:#F0FFF4;color:#166534}

var EMAP = {
  'MCB-M1-9470':'IMARAT','MCB-GR-1231':'Graana','MCB-A21-0483':'Agency 21',

firebase.initializeApp(FIREBASE_CONFIG);
auth = firebase.auth();

auth.onAuthStateChanged(function(user) {
  if (user) {
    ge('login-screen').style.display = 'none';

    ge('logout-btn').style.display    = '';

// ════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════
function doLogin() {
  var email = ge('li-email').value.trim();
  var pass  = ge('li-pass').value;
  var btn   = ge('li-btn');
  ge('li-err').style.display = 'none';
  if (!email || !pass) { showErr('Please enter email and password.'); return; }
  btn.disabled = true;
  btn.textContent = 'Signing in\u2026';
  auth.signInWithEmailAndPassword(email, pass)
    .then(function() {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      var msg = 'Login failed. Check your credentials.';
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'Incorrect email or password.';
      if (e.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
      showErr(msg);
    });
}

function doLogout() { auth.signOut(); }

function showErr(msg) {
  var el = ge('li-err');
  el.textContent = msg;
  el.style.display = 'block';
}

ge('li-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ════════════════════════════════════════════════════════════
// DATA LOADING
// ════════════════════════════════════════════════════════════
function loadData() {
  showLoading('Fetching live data from System\u2026');
  var url = APPS_SCRIPT_URL + '?action=read&clientKey=' + CLIENT_KEY + '&_=' + Date.now();
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(json) {
      console.log('[IMARAT] Apps Script raw response keys:', Object.keys(json));
      console.log('[IMARAT] status:', json.status, '| at:', json.at);
      if (json.data) console.log('[IMARAT] data keys:', Object.keys(json.data));
      if (json.status !== 'ok') throw new Error(json.message || 'Server error: status=' + json.status);
      D = mapResponse(json);
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(D)); } catch(x){}
      hideLoading();
      hideStaleBanner();
      updateHpill(json.at);
      ge('refresh-status').textContent = 'Updated ' + fmtTime(new Date());
      render();
    })
    .catch(function(err) {
      hideLoading();
      console.warn('Fetch failed:', err.message);
      loadFromCache();
    });
}

function loadFromCache() {
  try {
    var saved = localStorage.getItem(CACHE_KEY);
    if (saved) {
      D = JSON.parse(saved);
      showStaleBanner(D.at);
      ge('refresh-status').textContent = 'Offline \u2014 cached ' + fmtTime(new Date(D.at));
      render();
    } else {
      console.warn('No cached data available.');
    }
  } catch(x) { console.warn('Cache read error:', x); }
}

function mapResponse(json) {
  var d = json.data || {};
  // Defensive fallbacks — if any sheet tab is missing, we get safe empty objects
  var inflow   = d.inflow   || {};
  var expenses = d.expenses || { expenses: [], totalToday: 0, totalMTD: 0 };
  var balances = d.balances || { accounts: [], currentBalance: 0, cashInHand: 0, totalWorking: 0, float: 0 };
  if (!expenses.expenses) expenses.expenses = [];
  if (!balances.accounts) balances.accounts = [];
  return {
    I:             inflow,
    E:             expenses,
    B:             attachEntities(balances),
    pendingDetail: d.pendingDetail || [],
    at:            json.at
  };
}

function attachEntities(b) {
  var accs = b.accounts || [];
  for (var i = 0; i < accs.length; i++) {
    accs[i].entity = EMAP[accs[i].code] || guessEnt(accs[i].code);
  }
  return b;
}

function guessEnt(code) {
  var c = (code || '').toUpperCase();
  if (c.indexOf('GR') >= 0 && c.indexOf('PROP') < 0) return 'Graana';
  if (c.indexOf('A21') >= 0) return 'Agency 21';
  return 'IMARAT';
}

function manualRefresh() {
  if (!auth.currentUser) return;
  loadData();
}

function startAutoRefresh() {
  stopAutoRefresh();
  refreshTimer = setInterval(function() {
    if (auth.currentUser) loadData();
  }, REFRESH_MS);
}

function stopAutoRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

// ════════════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════════════
function ge(id) { return document.getElementById(id); }

function showLoading(txt) {
  ge('loading-overlay').style.display = 'flex';
  ge('loading-txt').textContent = txt || 'Loading\u2026';
}
function hideLoading() { ge('loading-overlay').style.display = 'none'; }

function showStaleBanner(isoDate) {
  ge('stale-banner').style.display = 'block';
  ge('stale-time').textContent = isoDate ? fmtTime(new Date(isoDate)) : '\u2014';
}
function hideStaleBanner() { ge('stale-banner').style.display = 'none'; }

// FIX: was setting 'hdr-pill pill-green' — class doesn't exist; use 'live-pill'
function updateHpill(isoDate) {
  var el = ge('hpill');
  el.className = 'live-pill';
  el.textContent = '\u25cf Live \u2014 ' + (isoDate ? fmtTime(new Date(isoDate)) : '\u2014');
}

function fmtTime(d) {
  return d.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
}

function goTab(name, btn) {
  var panes = document.querySelectorAll('.pane');
  for (var i = 0; i < panes.length; i++) panes[i].classList.remove('on');
  var tabs = document.querySelectorAll('.nt');
  for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('on');
  var p = ge('pane-' + name);
  if (p) p.classList.add('on');
  if (btn) btn.classList.add('on');
  if (!btn) {
    var allNt = document.querySelectorAll('.nt');
    for (var k = 0; k < allNt.length; k++) {
      var oc = allNt[k].getAttribute('onclick') || '';
      if (oc.indexOf("'" + name + "'") >= 0) { allNt[k].classList.add('on'); break; }
    }
  }
  if (D) {
    try {
      if (name === 'overview')    rOV();
      else if (name === 'liquidity')   rLQ();
      else if (name === 'revenue')     rRV();
      else if (name === 'receivables') rRX();
      else if (name === 'expenses')    rEX();
    } catch(e) { console.error('goTab render:', e); }
  }
}

// ════════════════════════════════════════════════════════════
// INTERACTIVE NAVIGATION
// ════════════════════════════════════════════════════════════
function handleClick(el) {
  var tab  = el.getAttribute('data-tab') || 'receivables';
  var ent  = el.getAttribute('data-ent') || '';
  var st   = el.getAttribute('data-st')  || '';
  var filters = (ent || st) ? {entity: ent, status: st} : null;
  navTo(tab, filters);
}

function navTo(tabName, filters) {
  var tabs = document.querySelectorAll('.nt');
  var targetBtn = null;
  for (var i = 0; i < tabs.length; i++) {
    var oc = tabs[i].getAttribute('onclick') || '';
    if (oc.indexOf("'" + tabName + "'") >= 0) { targetBtn = tabs[i]; break; }
  }
  goTab(tabName, targetBtn);

  // FIX: filterRx was undefined; use rxEnt for entity filter, inline status filter
  if (filters && D) {
    if (tabName === 'receivables') {
      if (filters.entity) {
        var pills = document.querySelectorAll('.epill');
        for (var p = 0; p < pills.length; p++) pills[p].classList.remove('active');
        rxEnt(filters.entity, null);
      } else if (filters.status) {
        rxSt(filters.status);
      }
    }
  }

  window.scrollTo(0, 0);
}

function render() {
  if (!D) return;
  // Debug: log data structure so any issues can be identified in console
  console.log('[IMARAT] D keys:', Object.keys(D));
  console.log('[IMARAT] D.I:', D.I ? Object.keys(D.I) : 'MISSING');
  console.log('[IMARAT] D.E:', D.E ? (D.E.expenses ? 'ok ('+D.E.expenses.length+' items)' : Object.keys(D.E)) : 'MISSING');
  console.log('[IMARAT] D.B:', D.B ? (D.B.accounts ? 'ok ('+D.B.accounts.length+' accounts)' : Object.keys(D.B)) : 'MISSING');
  console.log('[IMARAT] pendingDetail:', (D.pendingDetail||[]).length, 'rows');
  try { rOV(); } catch(e) { console.error('[IMARAT] rOV error:', e); showPaneError('ov-body', e); }
  try { rLQ(); } catch(e) { console.error('[IMARAT] rLQ error:', e); showPaneError('lq-body', e); }
  try { rRV(); } catch(e) { console.error('[IMARAT] rRV error:', e); showPaneError('rv-body', e); }
  try { rRX(); } catch(e) { console.error('[IMARAT] rRX error:', e); showPaneError('rx-body', e); }
  try { rEX(); } catch(e) { console.error('[IMARAT] rEX error:', e); showPaneError('ex-body', e); }
}

function showPaneError(paneId, err) {
  var el = ge(paneId);
  if (!el || el.innerHTML.trim()) return; // don't overwrite if something already rendered
  el.innerHTML = '<div class="card" style="margin-top:12px"><div class="cb"><div style="text-align:center;padding:20px">'
    + '<div style="font-size:24px;margin-bottom:8px">&#9888;</div>'
    + '<div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px">Data render error</div>'
    + '<div style="font-size:11px;color:var(--t3);margin-bottom:12px">' + (err && err.message ? err.message : String(err)) + '</div>'
    + '<button onclick="manualRefresh()" style="padding:8px 16px;background:#166534;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">&#8635; Retry</button>'
    + '</div></div></div>';
}

// ════════════════════════════════════════════════════════════
// FORMAT
// ════════════════════════════════════════════════════════════
function M(n) {
  if (!n && n !== 0) return '\u2014';
  var a = Math.abs(n), s = n < 0 ? '-' : '';
  if (a >= 1e9) return s + 'Rs ' + (a/1e9).toFixed(2) + ' B';
  if (a >= 1e6) return s + 'Rs ' + (a/1e6).toFixed(2) + ' M';
  if (a >= 1e3) return s + 'Rs ' + (a/1e3).toFixed(1) + ' K';
  return s + 'Rs ' + Math.round(a).toLocaleString();
}
function PKR(n) {
  if (!n && n !== 0) return '\u2014';
  var a = Math.abs(n), s = n < 0 ? '-' : '';
  if (a >= 1e6) return s + (a/1e6).toFixed(2) + ' M';
  if (a >= 1e3) return s + (a/1e3).toFixed(1) + ' K';
  return s + Math.round(a).toLocaleString('en-IN');
}

// ════════════════════════════════════════════════════════════
// SHARED CARD BUILDERS
// ════════════════════════════════════════════════════════════

// Shows when data is present but mapped fields are missing — helps diagnose Apps Script format issues
function noDataCard(tabName, d) {
  var keys = d ? Object.keys(d).join(', ') : 'null';
  var iKeys = (d && d.I) ? Object.keys(d.I).slice(0,6).join(', ')+'...' : 'not present';
  var eKeys = (d && d.E) ? Object.keys(d.E).slice(0,4).join(', ')+'...' : 'not present';
  var bKeys = (d && d.B) ? Object.keys(d.B).slice(0,4).join(', ')+'...' : 'not present';
  return '<div class="card" style="margin-top:12px"><div class="cb"><div style="text-align:center;padding:20px 10px">'
    + '<div style="font-size:24px;margin-bottom:8px">&#128203;</div>'
    + '<div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px">' + tabName + ' data not available</div>'
    + '<div style="font-size:11px;color:var(--t3);margin-bottom:12px">The dashboard received data but could not map it to this view.<br>Check the Apps Script response format.</div>'

    {n:'On Hold',       v:I.on_hold,          c:'#D97706'},
    {n:'Postdated',     v:I.postdated,        c:'#7C3AED'},
    {n:'Presented',     v:I.presented,        c:'#16A34A'},

var BANK_CLR = {
  MCB:    {bg:'#22C55E', tx:'#fff'},
  ASKARI: {bg:'#6B7280', tx:'#fff'},
  UBL:    {bg:'#2563EB', tx:'#fff'},
  JAZZ:   {bg:'#DC2626', tx:'#fff'},
  UBANK:  {bg:'#EA7820', tx:'#fff'},
  SCB:    {bg:'#0D9488', tx:'#fff'}
};
var BANK_ABBRV = {MCB:'MCB', ASKARI:'AKBL', UBL:'UBL', JAZZ:'JAZZ', UBANK:'UBNK', SCB:'SCB'};

function rLQ() {
  if (!D || !D.B) { ge('lq-body').innerHTML = noDataCard('Bank Liquidity', D); return; }
  var B = D.B;

  var hero = '<div class="hero-card" data-tab="liquidity" onclick="handleClick(this)">'
    + '<div class="hero-icon">&#127981;</div>'
    + '<div class="hero-lbl">BANK BALANCE</div>'
    + '<div class="hero-val">' + M(B.currentBalance) + '</div>'
    + '<div class="hero-sub">' + B.accounts.filter(function(a) { return a.working > 0; }).length + ' banks &middot; ' + B.accounts.length + ' accounts <span class="hero-arr">&rarr;</span></div>'
    + '</div>';

  var kpis = '<div class="flat-grid">'
    + flatKpi('CASH IN HAND', M(B.cashInHand), '4 locations', '#16A34A', 'liquidity')
    + flatKpi('FLOAT / HOLD', M(B.float),      'In transit',  '#D97706', 'liquidity')
    + '</div>';

  var pills = '<div class="pill-row">'
    + '<div class="epill active" onclick="filterAccEnt(\'\',this)">All accounts</div>'
    + '<div class="epill" onclick="filterAccEnt(\'IMARAT\',this)"><span class="dot-sm" style="background:#166534"></span>IMARAT</div>'
    + '<div class="epill" onclick="filterAccEnt(\'Graana\',this)"><span class="dot-sm" style="background:#DC2626"></span>Graana</div>'
    + '<div class="epill" onclick="filterAccEnt(\'Agency 21\',this)"><span class="dot-sm" style="background:#22C55E"></span>Agency 21</div>'
    + '</div>';

  var groups = {};
  for (var i = 0; i < B.accounts.length; i++) {
    var a = B.accounts[i], bn = a.bank || 'Other';
    if (!groups[bn]) groups[bn] = {tot:0, fl:0, accs:[]};
    groups[bn].tot += a.working;
    groups[bn].fl  += a.float || 0;
    groups[bn].accs.push(a);
  }
  var sorted = Object.keys(groups).sort(function(a, b) { return groups[b].tot - groups[a].tot; });

  var accsHtml = '<div class="sec-hdr"><span>BANK ACCOUNTS</span><span>' + M(B.currentBalance) + '</span></div>';
  accsHtml += '<div id="acc-groups">';
  for (var g = 0; g < sorted.length; g++) {
    var bn = sorted[g], grp = groups[bn];
    var clr = BANK_CLR[bn] || {bg:'#4A6B4E', tx:'#fff'};
    var abbr = BANK_ABBRV[bn] || bn.substr(0, 4);
    var acRows = '';
    for (var k = 0; k < grp.accs.length; k++) {
      var a = grp.accs[k];
      if (a.working === 0) continue;
      var ec = ECOL[a.entity] || '#4A6B4E';
      acRows += '<div class="acc-row">'
        + '<div class="acc-left"><span class="dot-sm" style="background:' + ec + '"></span>'
        + '<div><div class="acc-code">' + a.code + '</div><div class="acc-ent">' + a.entity + '</div></div></div>'
        + '<div class="acc-right"><div class="acc-amt">' + M(a.working) + '</div>'
        + (a.float > 0 ? '<div class="acc-float">FLOAT ' + M(a.float) + '</div>' : '')
        + '</div></div>';
    }
    if (!acRows) continue;
    accsHtml += '<div class="bank-group" data-bank="' + bn + '">'
      + '<div class="bank-hdr">'
      + '<div class="bank-hdr-l"><div class="bank-logo" style="background:' + clr.bg + ';color:' + clr.tx + '">' + abbr + '</div>'
      + '<div><div class="bank-name">' + bn + '</div><div class="bank-sub">'
      + grp.accs.filter(function(x) { return x.working > 0; }).length + ' accounts'
      + (grp.fl > 0 ? ' &middot; Float ' + M(grp.fl) : '')
      + '</div></div></div>'
      + '<div class="bank-hdr-r"><div class="bank-tot">' + M(grp.tot) + '</div><div class="bank-status">WORKING</div></div>'
      + '</div>'
      + acRows
      + '</div>';
  }
  accsHtml += '</div>';

  ge('lq-body').innerHTML = hero + kpis + pills + accsHtml;
}

function filterAccEnt(ent, el) {
  var pills = document.querySelectorAll('.epill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  if (el) el.classList.add('active');
  var groups = document.querySelectorAll('.bank-group');
  for (var i = 0; i < groups.length; i++) {
    if (!ent) { groups[i].style.display = ''; continue; }
    var rows = groups[i].querySelectorAll('.acc-row');
    var show = false;
    for (var j = 0; j < rows.length; j++) {
      var entEl = rows[j].querySelector('.acc-ent');
      if (entEl && entEl.textContent === ent) { show = true; break; }
    }
    groups[i].style.display = show ? '' : 'none';
  }
}

// RECEIVABLES
// ════════════════════════════════════════════════════════════
var _rxFilter = {ent: '', st: ''};

function rRX() {
  if (!D) { ge('rx-body').innerHTML = noDataCard('Receivables', D); return; }
  var rows = D.pendingDetail || [];
  var tot = 0, hr = 0, esc = 0, mon = 0;
  for (var i = 0; i < rows.length; i++) {
    tot += rows[i].amount;
    var rf = (rows[i].riskFlag || '').toUpperCase();
    if (rf.indexOf('HIGH RISK') >= 0) hr  += rows[i].amount;
    else if (rf === 'ESCALATE')        esc += rows[i].amount;
    else                               mon += rows[i].amount;
  }
  var hrCnt  = rows.filter(function(r) { return (r.riskFlag||'').toUpperCase().indexOf('HIGH RISK') >= 0; }).length;
  var escCnt = rows.filter(function(r) { return (r.riskFlag||'').toUpperCase() === 'ESCALATE'; }).length;
  var monCnt = rows.filter(function(r) { var rf=(r.riskFlag||'').toUpperCase(); return rf !== 'ESCALATE' && rf.indexOf('HIGH RISK') < 0; }).length;

  var hero = '<div class="hero-card">'
    + '<div class="hero-icon">&#128202;</div>'
    + '<div class="hero-lbl">PENDING TILL DATE</div>'
    + '<div class="hero-val">' + M(tot) + '</div>'
    + '<div class="hero-sub">' + rows.length + ' receivables &middot; ' + hrCnt + ' high risk <span class="hero-arr">&rarr;</span></div>'
    + '</div>';

  var riskCards = '<div class="risk-grid">'
    + '<div class="risk-card red"><div class="risk-icon">&#9888;</div><div class="risk-cnt">' + hrCnt  + '</div><div class="risk-lbl">HIGH RISK</div><div class="risk-amt">' + M(hr)  + '</div></div>'
    + '<div class="risk-card amber"><div class="risk-icon">&#8593;</div><div class="risk-cnt">' + escCnt + '</div><div class="risk-lbl">ESCALATE</div><div class="risk-amt">'  + M(esc) + '</div></div>'
    + '<div class="risk-card green"><div class="risk-icon">&#9679;</div><div class="risk-cnt">' + monCnt + '</div><div class="risk-lbl">MONITOR</div><div class="risk-amt">'   + M(mon) + '</div></div>'
    + '</div>';

  var pills = '<div class="pill-row">'
    + '<div class="epill' + (!_rxFilter.ent ? ' active' : '') + '" onclick="rxEnt(\'\',this)">All entities</div>'
    + '<div class="epill' + (_rxFilter.ent==='IMARAT'    ? ' active' : '') + '" onclick="rxEnt(\'IMARAT\',this)"><span class="dot-sm" style="background:#166534"></span>IMARAT</div>'
    + '<div class="epill' + (_rxFilter.ent==='Graana'    ? ' active' : '') + '" onclick="rxEnt(\'Graana\',this)"><span class="dot-sm" style="background:#DC2626"></span>Graana</div>'
    + '<div class="epill' + (_rxFilter.ent==='Agency 21' ? ' active' : '') + '" onclick="rxEnt(\'Agency 21\',this)"><span class="dot-sm" style="background:#22C55E"></span>Agency 21</div>'
    + '</div>';

  ge('rx-body').innerHTML = hero + riskCards + pills
    + '<div class="sec-hdr rx-hdr"><span id="rx-sec-lbl">ALL RECEIVABLES</span><span id="rx-cnt-lbl">' + rows.length + ' of ' + rows.length + '</span></div>'
    + '<div id="rx-cards"></div>'
    + '<div class="rx-footer" id="rx-footer"><span class="rx-footer-l">Total pending</span><span class="rx-footer-r" id="rx-footer-amt">' + M(tot) + '</span></div>';

  renderRxCards(rows);
}

function renderRxCards(rows) {
  var stColors = {'Returned':'#DC2626','On Hold':'#D97706','Postdated':'#7C3AED','Presented':'#16A34A','Chq not received':'#2563EB','To Be Deposited':'#8AAB8E'};
  var stBg     = {'Returned':'#FEE2E2','On Hold':'#FEF3C7','Postdated':'#EDE9FE','Presented':'#DCFCE7','Chq not received':'#DBEAFE','To Be Deposited':'#F1F5F1'};
  var h = '', t = 0;
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var ec   = ECOL[row.company] || '#4A6B4E';
    var sc   = stColors[row.status] || '#8AAB8E';
    var sbg  = stBg[row.status]    || '#F1F5F1';
    var rf   = (row.riskFlag || '').toUpperCase();
    var riskBadge = rf.indexOf('HIGH RISK') >= 0
      ? '<span class="risk-badge hr">&#9888; HIGH RISK</span>'
      : rf === 'ESCALATE'
        ? '<span class="risk-badge esc">&#8593; ESCALATE</span>'
        : '<span class="risk-badge mon">&#9679; MONITOR</span>';
    var agCol = row.daysAging > 20 ? '#DC2626' : row.daysAging > 10 ? '#D97706' : '#4A6B4E';
    t += row.amount;
    h += '<div class="tx-card">'
      + '<div class="tx-top">'
      + '<div class="tx-tl"><div class="tx-name">' + (row.customer || '\u2014') + '</div>'
      + '<div class="tx-meta"><span class="dot-sm" style="background:' + ec + '"></span>' + row.company
      + (row.daysAging ? '<span class="age-pill" style="color:' + agCol + ';border-color:' + agCol + '20;background:' + agCol + '10">' + row.daysAging + 'd</span>' : '')
      + '</div></div>'
      + '<div class="tx-tr"><div class="tx-amt">' + M(row.amount) + '</div>' + riskBadge + '</div>'
      + '</div>'
      + '<div class="tx-status-bar" style="background:' + sbg + '"><span class="tx-st-dot" style="background:' + sc + '"></span><span style="color:' + sc + ';font-size:10px;font-weight:600;">' + row.status + '</span></div>'
      + '</div>';
  }
  var el = ge('rx-cards');
  if (el) el.innerHTML = h || '<div class="empty-sm">No records</div>';
  var cnt = ge('rx-cnt-lbl');
  if (cnt) cnt.textContent = rows.length + ' of ' + (D.pendingDetail || []).length;
  var fa = ge('rx-footer-amt');
  if (fa) fa.textContent = M(t);
}

function rxEnt(ent, el) {
  _rxFilter.ent = ent;
  var pills = document.querySelectorAll('.epill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  if (el) el.classList.add('active');
  // Re-activate correct pill when called programmatically without el
  if (!el && ent) {
    var allPills = document.querySelectorAll('.epill');
    for (var p = 0; p < allPills.length; p++) {
      if (allPills[p].textContent.trim().indexOf(ent) >= 0) { allPills[p].classList.add('active'); break; }
    }
  }
  if (!el && !ent) {
    var firstPill = document.querySelector('.epill');
    if (firstPill) firstPill.classList.add('active');
  }
  var rows = (D.pendingDetail || []).filter(function(r) { return !ent || r.company === ent; });
  renderRxCards(rows);
  var lbl = ge('rx-sec-lbl');
  if (lbl) lbl.textContent = ent ? 'ALL RECEIVABLES \u00b7 ' + ent : 'ALL RECEIVABLES';
}

// Filter by status (used by navTo from donut/legend clicks)
function rxSt(status) {
  _rxFilter.st = status;
  var rows = (D.pendingDetail || []).filter(function(r) { return !status || r.status === status; });
  renderRxCards(rows);
  var lbl = ge('rx-sec-lbl');
  if (lbl) lbl.textContent = status ? 'STATUS \u00b7 ' + status : 'ALL RECEIVABLES';
}

// ════════════════════════════════════════════════════════════
// EXPENSES
// ════════════════════════════════════════════════════════════
var EXP_COLORS = ['#C9A850','#2563EB','#EA7820','#EA7820','#DC2626','#C9A850','#6B7280','#7C3AED','#0D9488','#EC4899','#1E40AF','#06B6D4','#84CC16'];

function rEX() {
  if (!D || !D.E || !D.E.expenses) { ge('ex-body').innerHTML = noDataCard('Expenses', D); return; }
  var E = D.E;
  var today = new Date().toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short', year:'numeric'});

  var hero = '<div class="hero-card">'
    + '<div class="hero-icon">&#128203;</div>'
    + '<div class="hero-lbl">MTD TOTAL</div>'
    + '<div class="hero-val">' + M(E.totalMTD) + '</div>'
    + '<div class="hero-sub">' + E.expenses.filter(function(x) { return x.mtd > 0; }).length + ' categories &middot; May 2026 <span class="hero-arr">&rarr;</span></div>'
    + '</div>';

  var tsrt = E.expenses.filter(function(x) { return x.today > 0; }).sort(function(a, b) { return b.today - a.today; });
  var top  = tsrt.length ? tsrt[0] : null;

  // FIX: apostrophe in "TODAY'S SPEND" — use HTML entity &#8217;
  var todayCard = '<div class="split-card">'
    + '<div class="split-l"><div class="split-lbl">TODAY&#8217;S SPEND</div>'
    + '<div class="split-val">' + M(E.totalToday) + '</div>'
    + '<div class="split-sub">' + (E.totalMTD > 0 ? (E.totalToday/E.totalMTD*100).toFixed(1) : '0') + '% of MTD &middot; ' + today + '</div></div>'
    + (top ? '<div class="split-r"><div class="split-lbl">TOP TODAY</div><div class="top-star">&#11088; ' + top.head + '</div><div class="top-amt">' + M(top.today) + '</div></div>' : '')
    + '</div>';

  var msrt    = E.expenses.filter(function(x) { return x.mtd > 0; }).sort(function(a, b) { return b.mtd - a.mtd; });
  var todayRows = buildCatRows(tsrt, 'today');
  var mtdRows   = buildCatRows(msrt, 'mtd');

  ge('ex-body').innerHTML = hero + todayCard
    + '<div class="sec-hdr"><span>TODAY BY CATEGORY</span><span>' + tsrt.length + ' cats &nbsp;' + M(E.totalToday) + '</span></div>'
    + '<div class="card"><div class="cb cat-list">' + todayRows + '</div></div>'
    + '<div class="sec-hdr"><span>MTD BY CATEGORY</span><span>' + msrt.length + ' cats &nbsp;' + M(E.totalMTD) + '</span></div>'
    + '<div class="card"><div class="cb cat-list">' + mtdRows + '</div></div>';
}

function buildCatRows(items, field) {
  if (!items.length) return '<div class="empty-sm">No data</div>';
  var max = items[0][field];
  var h = '';
  for (var i = 0; i < items.length; i++) {
    var e = items[i], w = (e[field] / max * 100).toFixed(1);
    var c = EXP_COLORS[i % EXP_COLORS.length];
    h += '<div class="cat-row">'
      + '<div class="cat-name">' + (i === 0 ? '&#11088; ' : '') + e.head + '</div>'
      + '<div class="cat-bar-wrap"><div class="cat-bar" style="width:' + w + '%;background:' + c + '"></div></div>'
      + '<div class="cat-amt">' + M(e[field]) + '</div>'
      + '</div>';
  }
  return h;
}

// ════════════════════════════════════════════════════════════
// PWA SERVICE WORKER — registered once
// ════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/imarat-sap/sw.js')
    .then(function(reg) { console.log('SW registered, scope:', reg.scope); })
    .catch(function(err) { console.warn('SW registration failed:', err); });
}

// Init date display
ge('hdate').textContent = new Date().toLocaleDateString('en-PK', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
</script>
</body>
